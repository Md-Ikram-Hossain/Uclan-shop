<!DOCTYPE html>
<html>
<head>
<title>My E-Commerce</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>My Clothing Store</h1>

<nav>
<button onclick="showCategory('tshirt')">T-Shirts</button>
<button onclick="showCategory('hoodie')">Hoodies</button>
<button onclick="showCategory('jumper')">Jumpers</button>
</nav>

</header>

<section id="products">

<div id="tshirt" class="category">
<h2>T-Shirts</h2>

<div class="product">
<img src="https://via.placeholder.com/150">
<p>Black T-Shirt</p>
<p>$20</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<p>White T-Shirt</p>
<p>$18</p>
<button>Add to Cart</button>
</div>

</div>



<div id="hoodie" class="category">
<h2>Hoodies</h2>

<div class="product">
<img src="https://via.placeholder.com/150">
<p>Grey Hoodie</p>
<p>$40</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<p>Black Hoodie</p>
<p>$45</p>
<button>Add to Cart</button>
</div>

</div>



<div id="jumper" class="category">
<h2>Jumpers</h2>

<div class="product">
<img src="https://via.placeholder.com/150">
<p>Winter Jumper</p>
<p>$35</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<p>Classic Jumper</p>
<p>$32</p>
<button>Add to Cart</button>
</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
